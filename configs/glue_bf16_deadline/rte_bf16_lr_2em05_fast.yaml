task_group: roberta_glue
dataset_name: glue/rte
glue_task: rte
model_name_or_path: FacebookAI/roberta-large
method: bf16_reference
seed: 42
max_length: 128
results_csv: reproduce_table3/results/table3_glue_bf16_reference_lr_sweep.csv
lora:
  enabled: false
  r: ''
  alpha: ''
  dropout: ''
quantization:
  load_in_4bit: false
  load_in_8bit: false
  quant_type: none
  double_quant: false
training:
  output_dir: reproduce_table3/outputs/glue_bf16_deadline/rte_lr_2em05_fast
  overwrite_output_dir: true
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 64
  gradient_accumulation_steps: 1
  learning_rate: 2.0e-05
  num_train_epochs: 10
  max_steps: -1
  logging_steps: 100
  save_strategy: 'no'
  optim: adamw_torch
  weight_decay: 0.1
  lr_scheduler_type: linear
  warmup_ratio: 0.06
  max_grad_norm: 1.0
  gradient_checkpointing: false
  bf16: true
