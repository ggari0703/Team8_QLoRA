task_group: t5_sni
model_name_or_path: google/t5-v1_1-small
model_size_key: t5_80m
dataset_name: jayelm/natural-instructions
dataset_config_name: null
eval_filter_column: eval
method: qlora_int8
seed: 42
max_train_samples: null
max_eval_samples: null
input_encoding: tk_instruct_def_pos_2
num_positive_examples: 2
source_max_length: 1024
target_max_length: 128
generation_max_length: 128
results_csv: reproduce_table3/results/table3_hardware_scope.csv
quantization:
  load_in_4bit: false
  load_in_8bit: true
  quant_type: int8
  double_quant: false
lora:
  enabled: true
  r: 16
  alpha: 64
  dropout: 0.0
  target_modules: all-linear
training:
  output_dir: reproduce_table3/outputs/hardware_scope/t5_80m_qlora_int8
  learning_rate: 1.0e-05
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  num_train_epochs: 2
  max_steps: -1
  logging_steps: 25
  save_strategy: 'no'
  optim: paged_adamw_32bit
  lr_scheduler_type: constant
  warmup_ratio: 0.0
  max_grad_norm: 1.0
  gradient_checkpointing: true
  bf16: true
