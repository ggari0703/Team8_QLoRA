task_group: t5_sni
model_name_or_path: google/t5-v1_1-base
model_size_key: t5_250m
dataset_name: allenai/natural-instructions-local
local_sni_repo_path: reproduce_table3/data/natural-instructions
local_sni_split: default
local_sni_eval_instances_per_task: 100
limit_local_sni_before_arrow: true
method: qlora_nf4_dq
seed: 42
max_train_samples: null
max_eval_samples: 1000
input_encoding: tk_instruct_def_pos_2
num_positive_examples: 2
source_max_length: 1024
target_max_length: 128
generation_max_length: 128
results_csv: reproduce_table3/results/table3_sni_local.csv
quantization:
  load_in_4bit: true
  load_in_8bit: false
  quant_type: nf4
  double_quant: true
lora:
  enabled: true
  r: 16
  alpha: 64
  dropout: 0.0
  target_modules: all-linear
training:
  output_dir: reproduce_table3/outputs/sni_local/t5_250m_qlora_nf4_dq
  learning_rate: 1.0e-05
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  num_train_epochs: 1
  max_steps: -1
  logging_steps: 1000
  save_strategy: 'no'
  optim: paged_adamw_32bit
  lr_scheduler_type: constant
  warmup_ratio: 0.0
  max_grad_norm: 1.0
  gradient_checkpointing: true
  bf16: true
