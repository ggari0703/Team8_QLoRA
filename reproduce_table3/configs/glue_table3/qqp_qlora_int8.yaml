task_group: roberta_glue
dataset_name: glue/qqp
glue_task: qqp
model_name_or_path: FacebookAI/roberta-large
method: qlora_int8
seed: 42
max_length: 128
results_csv: reproduce_table3/results/table3_glue_table3.csv
lora:
  enabled: true
  r: 8
  alpha: 16
  dropout: 0.0
  target_modules:
  - query
  - value
quantization:
  load_in_4bit: false
  load_in_8bit: true
  quant_type: int8
  double_quant: false
training:
  output_dir: reproduce_table3/outputs/glue_table3/qqp_qlora_int8
  overwrite_output_dir: true
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 16
  gradient_accumulation_steps: 4
  learning_rate: 0.0003
  num_train_epochs: 10
  max_steps: -1
  logging_steps: 100
  save_strategy: 'no'
  optim: adamw_torch
  lr_scheduler_type: linear
  warmup_ratio: 0.06
  max_grad_norm: 1.0
  gradient_checkpointing: false
  bf16: true
